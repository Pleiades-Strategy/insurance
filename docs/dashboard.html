<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Insurance Bill Tracker | Pleiades Strategy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Abel&family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  /* ── Reset & base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #F7F5F1;
    --surface:   #ffffff;
    --border:    #D8D6D0;
    --primary:   #00005B;
    --primary-l: #EFF5FB;
    --text:      #1A1A3E;
    --muted:     #5A5A7A;
    --green:     #16a34a;
    --red:       #dc2626;
    --amber:     #d97706;
    --blue:      #2F74BA;
    --blue-light:#9FBADC;
    --sand:      #E0DFDA;
    --radius:    6px;
    --shadow:    0 1px 3px rgba(0,0,30,.08), 0 1px 2px rgba(0,0,30,.05);
  }
  body { font-family: 'Raleway', 'Proxima Nova', -apple-system, sans-serif;
         background: var(--bg); color: var(--text); font-size: 14px; }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }
  button { cursor: pointer; font: inherit; }

  /* ── Layout ── */
  .app { display: flex; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 228px; min-width: 228px; background: var(--primary);
    display: flex; flex-direction: column; padding: 0;
  }
  .sidebar-logo {
    padding: 20px 16px 16px;
    color: #fff; font-family: 'Abel', sans-serif; font-size: 15px; line-height: 1.3;
    border-bottom: 1px solid rgba(255,255,255,.12);
    letter-spacing: .03em;
  }
  .sidebar-logo span { display: block; font-size: 11px; font-family: 'Raleway', sans-serif;
                       font-weight: 400; opacity: .6; margin-top: 4px; letter-spacing: .04em;
                       text-transform: uppercase; }
  .sidebar-logo .back-link {
    display: block; margin-top: 10px; font-size: 11px; font-family: 'Raleway', sans-serif;
    color: var(--blue-light); opacity: .8; text-decoration: none; letter-spacing: .02em;
  }
  .sidebar-logo .back-link:hover { opacity: 1; }
  .sidebar nav { flex: 1; padding: 8px 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; color: rgba(255,255,255,.75);
    cursor: pointer; font-size: 13px; border: none; background: none;
    width: 100%; text-align: left; transition: background .15s;
    font-family: 'Raleway', sans-serif; font-weight: 500;
  }
  .nav-item:hover { background: rgba(255,255,255,.09); color: #fff; }
  .nav-item.active { background: rgba(47,116,186,.35); color: #fff; font-weight: 600;
                     border-left: 3px solid var(--blue-light); }
  .nav-icon { font-size: 15px; width: 20px; text-align: center; }

  /* ── Main ── */
  .main { flex: 1; overflow: auto; display: flex; flex-direction: column; }
  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 13px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 10;
    box-shadow: 0 1px 4px rgba(0,0,30,.06);
  }
  .topbar h1 { font-size: 16px; font-weight: 600; font-family: 'Abel', sans-serif;
               letter-spacing: .03em; color: var(--primary); font-size: 17px; }
  .topbar .spacer { flex: 1; }
  .badge-db { font-size: 11px; padding: 3px 10px; border-radius: 20px;
              background: #dcfce7; color: #166534; font-weight: 600; letter-spacing: .02em; }
  .badge-db.err { background: #fee2e2; color: #991b1b; }

  .content { padding: 24px; flex: 1; }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border);
          border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-header { padding: 12px 16px; border-bottom: 1px solid var(--border);
                 font-weight: 600; font-size: 11px; color: var(--muted);
                 text-transform: uppercase; letter-spacing: .08em; }

  /* ── Stat row ── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border);
               border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing:.08em;
                color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  .stat-value { font-size: 32px; font-family: 'Abel', sans-serif; color: var(--primary); }
  .stat-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Charts ── */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-grid .card { padding: 16px; }
  .chart-grid canvas { max-height: 240px; }
  .chart-full { margin-bottom: 24px; }
  .chart-full .card { padding: 16px; }
  .chart-full canvas { max-height: 280px; }

  /* ── Filters bar ── */
  .filters {
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .filters select, .filters input[type=text] {
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; font: inherit; color: var(--text);
    background: var(--bg); outline: none;
  }
  .filters select:focus, .filters input:focus { border-color: var(--primary); }
  .filters input[type=text] { min-width: 220px; }
  .btn {
    padding: 6px 14px; border-radius: 6px; border: none; font: inherit;
    font-size: 13px; font-weight: 500; transition: background .15s;
  }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-primary:hover { background: #2563A8; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
  .btn-ghost:hover { background: var(--sand); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; border-radius: var(--radius);
                box-shadow: var(--shadow); background: var(--surface);
                border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #f8fafc; padding: 10px 12px; text-align: left;
             font-weight: 600; color: var(--muted); font-size: 11px;
             text-transform: uppercase; letter-spacing: .04em;
             border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8fafc; cursor: pointer; }
  tbody td { padding: 9px 12px; vertical-align: middle; }
  .td-state { font-weight: 700; color: var(--primary); width: 44px; font-family: 'Abel', sans-serif; font-size: 15px; }
  .td-bill  { font-weight: 600; white-space: nowrap; }
  .td-title { max-width: 340px; }
  .td-title span { display: -webkit-box; -webkit-line-clamp: 2;
                   -webkit-box-orient: vertical; overflow: hidden; }
  .td-date  { white-space: nowrap; color: var(--muted); }

  /* ── Status badges ── */
  .status { display: inline-block; padding: 2px 8px; border-radius: 20px;
            font-size: 11px; font-weight: 600; white-space: nowrap; }
  .s-introduced   { background: #dbeafe; color: #1e40af; }
  .s-committee    { background: #fef9c3; color: #854d0e; }
  .s-crossedover  { background: #ffedd5; color: #9a3412; }
  .s-passed       { background: #dcfce7; color: #166534; }
  .s-enacted      { background: #bbf7d0; color: #14532d; }
  .s-dead         { background: #fee2e2; color: #991b1b; }
  .s-vetoed       { background: #fce7f3; color: #9d174d; }
  .s-other        { background: #f1f5f9; color: #475569; }

  /* ── Tags ── */
  .tag { display: inline-block; padding: 1px 7px; border-radius: 20px;
         font-size: 10px; font-weight: 600; background: var(--primary-l);
         color: var(--blue); margin: 1px; letter-spacing: .02em; }

  /* ── Pagination ── */
  .pagination { display: flex; align-items: center; gap: 8px; padding: 14px 0;
                justify-content: flex-end; font-size: 13px; color: var(--muted); }
  .pagination button { padding: 5px 11px; border-radius: 6px; border: 1px solid var(--border);
                       background: var(--surface); color: var(--text); }
  .pagination button:disabled { opacity: .4; cursor: default; }
  .pagination button:not(:disabled):hover { background: var(--bg); }

  /* ── Detail panel ── */
  .detail-back { margin-bottom: 16px; }
  .detail-header { display: flex; gap: 20px; align-items: flex-start;
                   background: var(--surface); border: 1px solid var(--border);
                   border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
                   box-shadow: var(--shadow); }
  .detail-main { flex: 1; }
  .detail-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .detail-meta  { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
  .detail-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .detail-links a { font-size: 12px; padding: 5px 12px; border-radius: 6px;
                    border: 1px solid var(--border); color: var(--primary); }
  .detail-links a:hover { background: var(--primary-l); text-decoration: none; }
  .detail-side  { min-width: 180px; display: flex; flex-direction: column; gap: 10px; }
  .detail-kv    { font-size: 12px; }
  .detail-kv dt { color: var(--muted); font-weight: 500; margin-bottom: 2px; }
  .detail-kv dd { color: var(--text); font-weight: 600; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .detail-section { background: var(--surface); border: 1px solid var(--border);
                    border-radius: var(--radius); box-shadow: var(--shadow); }
  .detail-section .card-header { font-size: 12px; }
  .detail-section .inner { padding: 14px 16px; }
  .detail-full { margin-bottom: 16px; }

  .sponsor-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .sponsor-item:last-child { border-bottom: none; }
  .sponsor-name { font-weight: 600; }
  .sponsor-meta { color: var(--muted); font-size: 11px; margin-top: 1px; }

  .hearing-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .hearing-item:last-child { border-bottom: none; }

  .summary-text { line-height: 1.6; color: var(--text); font-size: 13px; }

  /* ── Legislators ── */
  .leg-party-D { color: #1d4ed8; font-weight: 700; }
  .leg-party-R { color: #dc2626; font-weight: 700; }
  .leg-party-I { color: #6b7280; font-weight: 700; }

  /* ── Empty / loading ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--border);
             border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .chart-grid { grid-template-columns: 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .detail-header { flex-direction: column; }
  }
  @media (max-width: 640px) {
    .sidebar { width: 52px; min-width: 52px; }
    .sidebar-logo, .nav-item span { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      ● Pleiades Strategy
      <span>Insurance Bill Tracker</span>
      <a href="index.html" class="back-link">← Back to overview</a>
    </div>
    <nav>
      <button class="nav-item active" data-view="dashboard" onclick="showView('dashboard')">
        <span class="nav-icon">📊</span><span>Dashboard</span>
      </button>
      <button class="nav-item" data-view="bills" onclick="showView('bills')">
        <span class="nav-icon">📋</span><span>Bills</span>
      </button>
      <button class="nav-item" data-view="legislators" onclick="showView('legislators')">
        <span class="nav-icon">👤</span><span>Legislators</span>
      </button>
      <button class="nav-item" data-view="hearings" onclick="showView('hearings')">
        <span class="nav-icon">📅</span><span>Hearings</span>
      </button>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="spacer"></div>
      <span id="db-badge" class="badge-db">Connecting…</span>
    </div>
    <div class="content" id="content">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<script>
// ── Static mode — data loaded from data.json ────────────────────────────────
let STATIC = null; // populated on load

async function loadStaticData() {
  const r = await fetch('data.json');
  if (!r.ok) throw new Error('data.json not found');
  STATIC = await r.json();
}

// Shim: replaces live API calls with in-memory lookups
async function api(path) {
  if (!STATIC) await loadStaticData();
  const url  = new URL(path, 'http://x');
  const p    = url.searchParams;
  const route = url.pathname;

  if (route === '/api/summary')     return STATIC.summary;
  if (route === '/api/charts')      return STATIC.charts;
  if (route === '/api/filters')     return staticFilters();
  if (route === '/api/legislators') return staticLegislators(p);
  if (route === '/api/hearings')    return { hearings: STATIC.hearings };
  if (route === '/api/bills')       return staticBills(p);
  if (route === '/api/bill')        return staticBillDetail(p.get('id'));
  return {};
}

function staticFilters() {
  const states   = [...new Set(STATIC.bills.map(b => b.state).filter(Boolean))].sort();
  const statuses = [...new Set(STATIC.bills.map(b => b.status).filter(Boolean))].sort();
  return { states, statuses };
}

function staticBills(p) {
  const state    = p.get('state')    || '';
  const status   = p.get('status')   || '';
  const category = p.get('category') || '';
  const search   = (p.get('search')  || '').toLowerCase();
  const limit    = parseInt(p.get('limit')  || '200');
  const offset   = parseInt(p.get('offset') || '0');

  let filtered = STATIC.bills.filter(b => {
    if (state    && b.state  !== state)  return false;
    if (status   && b.status !== status) return false;
    if (category && !(b.keyword_tags||'').includes(category)) return false;
    if (search   && !((b.title||'')+(b.bill_number||'')+(b.summary||'')).toLowerCase().includes(search)) return false;
    return true;
  });

  return { total: filtered.length, bills: filtered.slice(offset, offset + limit) };
}

function staticBillDetail(id) {
  const bill = STATIC.bills.find(b => b.bill_id === id);
  if (!bill) return { error: 'not found' };
  const hearings = STATIC.hearings.filter(h => h.bill_id === id);
  return { bill, sponsors: bill.sponsors || [], hearings, actions: [] };
}

function staticLegislators(p) {
  const search = (p.get('search') || '').toLowerCase();
  const party  = p.get('party')   || '';
  let legs = STATIC.legislators;
  if (search) legs = legs.filter(l => (l.legislator_name||'').toLowerCase().includes(search));
  if (party)  legs = legs.filter(l => l.legislator_party === party);
  return { legislators: legs };
}

// ── Config (kept for reference, not used in static mode) ────────────────────
const API = 'http://localhost:5050';

// ── Category display map ─────────────────────────────────────────────────────
const CAT_LABELS = {
  state_insurance_residual_markets:         'State Insurance & Residual Markets',
  fortification_programs:                   'Fortification Programs',
  non_admitted_market:                      'Non-Admitted Market',
  consumer_protections_and_market_conduct:  'Consumer Protections & Market Conduct',
  catastrophe_modeling:                     'Catastrophe Modeling',
  data_and_study:                           'Data & Study',
  fossil_fuel_accountability:               'Fossil Fuel Accountability',
  state_insurance_office_regulatory_powers: 'State Insurance Office / Regulatory Powers',
  property_disclosure:                      'Property Disclosure',
  building_codes_land_use:                  'Building Codes / Land Use',
  climate_resilience_and_risk_mitigation:   'Climate Resilience & Risk Mitigation',
  reinsurance:                              'Reinsurance',
  litigation_and_tort_reform:               'Litigation & Tort Reform',
  rate_regulation:                          'Rate Regulation',
  climate_risk_disclosure:                  'Climate Risk Disclosure',
  anti_esg:                                 'Anti-ESG',
};
function catLabel(k) { return CAT_LABELS[k] || k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); }

// ── Status helpers ────────────────────────────────────────────────────────────
const STATUS_CLASS = {
  'Introduced': 's-introduced', 'In Committee': 's-committee',
  'Crossed Over': 's-crossedover', 'Passed': 's-passed',
  'Signed/Enacted/Adopted': 's-enacted', 'Dead': 's-dead', 'Vetoed': 's-vetoed',
};
function statusBadge(s) {
  const cls = STATUS_CLASS[s] || 's-other';
  return `<span class="status ${cls}">${s || '—'}</span>`;
}

// ── Fetch helper ──────────────────────────────────────────────────────────────
async function api(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

// ── State ─────────────────────────────────────────────────────────────────────
let currentView = 'dashboard';
let billsState  = { page: 0, perPage: 50, total: 0, filters: {} };
let filterCache = null;
let chartsCache = null;
let chartInstances = {};

// ── Navigation ────────────────────────────────────────────────────────────────
const VIEW_TITLES = { dashboard:'Dashboard', bills:'Bills', legislators:'Legislators', hearings:'Hearings', detail:'Bill Detail' };

function showView(view, extra) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === view);
  });
  document.getElementById('page-title').textContent = VIEW_TITLES[view] || view;
  // Destroy any existing chart instances to avoid canvas reuse errors
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  if      (view === 'dashboard')   renderDashboard();
  else if (view === 'bills')       renderBills();
  else if (view === 'legislators') renderLegislators();
  else if (view === 'hearings')    renderHearings();
  else if (view === 'detail')      renderDetail(extra);
}

// ── DB status check ───────────────────────────────────────────────────────────
async function checkDB() {
  const badge = document.getElementById('db-badge');
  try {
    await loadStaticData();
    const d = STATIC.summary;
    badge.textContent = `● ${d.total} bills · ${d.states} states`;
    badge.className = 'badge-db';
  } catch {
    badge.textContent = '● Data unavailable';
    badge.className = 'badge-db err';
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// DASHBOARD VIEW
// ─────────────────────────────────────────────────────────────────────────────
async function renderDashboard() {
  const [summary, charts] = await Promise.all([
    api('/api/summary'),
    api('/api/charts'),
  ]);
  chartsCache = charts;

  const statusColors = {
    'Introduced':'#2F74BA','In Committee':'#d97706','Crossed Over':'#f97316',
    'Passed':'#22c55e','Signed/Enacted/Adopted':'#16a34a',
    'Dead':'#ef4444','Vetoed':'#9FBADC',
  };

  document.getElementById('content').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-label">Total Bills</div>
        <div class="stat-value">${summary.total.toLocaleString()}</div>
        <div class="stat-sub">across ${summary.states} states</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Active</div>
        <div class="stat-value" style="color:#d97706">${summary.active.toLocaleString()}</div>
        <div class="stat-sub">in progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Enacted</div>
        <div class="stat-value" style="color:#16a34a">${summary.enacted.toLocaleString()}</div>
        <div class="stat-sub">signed into law</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Dead / Failed</div>
        <div class="stat-value" style="color:#dc2626">${summary.dead.toLocaleString()}</div>
        <div class="stat-sub">bills</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Full Text</div>
        <div class="stat-value" style="color:#7c3aed">${summary.with_text.toLocaleString()}</div>
        <div class="stat-sub">bills enriched</div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="card">
        <div class="card-header">Bills by Status</div>
        <canvas id="chart-status"></canvas>
      </div>
      <div class="card">
        <div class="card-header">Top States by Bill Count</div>
        <canvas id="chart-states"></canvas>
      </div>
    </div>

    <div class="chart-full">
      <div class="card">
        <div class="card-header">Bills by Category</div>
        <canvas id="chart-cats"></canvas>
      </div>
    </div>
  `;

  // Status doughnut
  const statusData = charts.by_status;
  chartInstances['status'] = new Chart(document.getElementById('chart-status'), {
    type: 'doughnut',
    data: {
      labels: statusData.map(d => d.status),
      datasets: [{ data: statusData.map(d => d.count),
        backgroundColor: statusData.map(d => statusColors[d.status] || '#94a3b8'),
        borderWidth: 2, borderColor: '#fff' }]
    },
    options: { plugins: { legend: { position:'right', labels:{ boxWidth:12, font:{size:11} } } },
               cutout: '55%', maintainAspectRatio: true }
  });

  // States bar (horizontal)
  const stateData = charts.by_state.slice(0,15);
  chartInstances['states'] = new Chart(document.getElementById('chart-states'), {
    type: 'bar',
    data: {
      labels: stateData.map(d => d.state),
      datasets: [{ data: stateData.map(d => d.count),
        backgroundColor: '#2F74BA', borderRadius: 4 }]
    },
    options: { indexAxis:'y', plugins:{legend:{display:false}},
               scales:{ x:{grid:{color:'#f1f5f9'}}, y:{ticks:{font:{size:11}}} },
               maintainAspectRatio: true }
  });

  // Category bar
  const catData = charts.by_category;
  chartInstances['cats'] = new Chart(document.getElementById('chart-cats'), {
    type: 'bar',
    data: {
      labels: catData.map(d => catLabel(d.category)),
      datasets: [{ data: catData.map(d => d.count),
        backgroundColor: '#00005B', borderRadius: 4 }]
    },
    options: { plugins:{legend:{display:false}},
               scales:{
                 x:{ ticks:{ maxRotation:35, font:{size:10} }, grid:{display:false} },
                 y:{ grid:{ color:'#f1f5f9' } }
               },
               maintainAspectRatio: false }
  });
  document.querySelector('.chart-full canvas').style.height = '260px';
}

// ─────────────────────────────────────────────────────────────────────────────
// BILLS VIEW
// ─────────────────────────────────────────────────────────────────────────────
async function renderBills(reset = true) {
  if (reset) { billsState.page = 0; billsState.filters = {}; }
  if (!filterCache) filterCache = await api('/api/filters');

  const f = billsState.filters;
  const params = new URLSearchParams({
    limit: billsState.perPage,
    offset: billsState.page * billsState.perPage,
    ...(f.state    ? { state:    f.state    } : {}),
    ...(f.status   ? { status:   f.status   } : {}),
    ...(f.category ? { category: f.category } : {}),
    ...(f.search   ? { search:   f.search   } : {}),
  });

  const data = await api('/api/bills?' + params);
  billsState.total = data.total;

  const catOptions = Object.keys(CAT_LABELS).map(k =>
    `<option value="${k}" ${f.category===k?'selected':''}>${catLabel(k)}</option>`
  ).join('');

  const stateOptions = filterCache.states.map(s =>
    `<option value="${s}" ${f.state===s?'selected':''}>${s}</option>`
  ).join('');

  const statusOptions = filterCache.statuses.map(s =>
    `<option value="${s}" ${f.status===s?'selected':''}>${s}</option>`
  ).join('');

  const totalPages = Math.ceil(data.total / billsState.perPage);
  const page = billsState.page;

  let rows = '';
  for (const b of data.bills) {
    let tags = '';
    try {
      const t = JSON.parse(b.keyword_tags || '[]');
      tags = t.slice(0,3).map(k => `<span class="tag">${catLabel(k)}</span>`).join('');
    } catch {}
    rows += `
      <tr onclick="showView('detail','${b.bill_id}')">
        <td class="td-state">${b.state||'—'}</td>
        <td class="td-bill">${b.bill_number||'—'}</td>
        <td class="td-title"><span title="${(b.title||'').replace(/"/g,'&quot;')}">${b.title||'—'}</span></td>
        <td>${statusBadge(b.status)}</td>
        <td class="td-date">${(b.last_action_date||'').slice(0,10)||'—'}</td>
        <td>${tags}</td>
      </tr>`;
  }
  if (!rows) rows = `<tr><td colspan="6" class="empty">No bills match your filters.</td></tr>`;

  document.getElementById('content').innerHTML = `
    <div class="filters">
      <input type="text" id="f-search" placeholder="Search title, bill number, summary…"
             value="${f.search||''}" onkeydown="if(event.key==='Enter')applyBillFilters()">
      <select id="f-state"    onchange="applyBillFilters()">
        <option value="">All States</option>${stateOptions}
      </select>
      <select id="f-status"   onchange="applyBillFilters()">
        <option value="">All Statuses</option>${statusOptions}
      </select>
      <select id="f-category" onchange="applyBillFilters()">
        <option value="">All Categories</option>${catOptions}
      </select>
      <button class="btn btn-primary" onclick="applyBillFilters()">Filter</button>
      <button class="btn btn-ghost"   onclick="clearBillFilters()">Clear</button>
      <span style="margin-left:auto;color:var(--muted);font-size:12px">${data.total.toLocaleString()} bills</span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>State</th><th>Bill</th><th>Title</th>
            <th>Status</th><th>Last Action</th><th>Categories</th>
          </tr>
        </thead>
        <tbody id="bills-body">${rows}</tbody>
      </table>
    </div>

    <div class="pagination">
      <span>Page ${page+1} of ${Math.max(1,totalPages)}</span>
      <button onclick="billPage(-1)" ${page===0?'disabled':''}>← Prev</button>
      <button onclick="billPage(1)"  ${page>=totalPages-1?'disabled':''}>Next →</button>
    </div>
  `;
}

function applyBillFilters() {
  billsState.filters = {
    search:   document.getElementById('f-search')?.value.trim()  || '',
    state:    document.getElementById('f-state')?.value           || '',
    status:   document.getElementById('f-status')?.value          || '',
    category: document.getElementById('f-category')?.value        || '',
  };
  billsState.page = 0;
  renderBills(false);
}

function clearBillFilters() {
  billsState.filters = {};
  billsState.page    = 0;
  renderBills(false);
}

function billPage(dir) {
  billsState.page = Math.max(0, billsState.page + dir);
  renderBills(false);
}

// ─────────────────────────────────────────────────────────────────────────────
// BILL DETAIL VIEW
// ─────────────────────────────────────────────────────────────────────────────
async function renderDetail(billId) {
  const data = await api(`/api/bill?id=${billId}`);
  if (data.error) {
    document.getElementById('content').innerHTML = `<div class="empty">Bill not found.</div>`;
    return;
  }
  const b = data.bill;

  let tags = '';
  try {
    const t = JSON.parse(b.keyword_tags || '[]');
    tags = t.map(k => `<span class="tag">${catLabel(k)}</span>`).join(' ');
  } catch {}

  const links = [
    b.bill_url      ? `<a href="${b.bill_url}"      target="_blank">View on BillTrack50 ↗</a>` : '',
    b.document_link ? `<a href="${b.document_link}" target="_blank">View Document ↗</a>`        : '',
  ].filter(Boolean).join('');

  const sponsorHtml = data.sponsors.length ? data.sponsors.map(s => `
    <div class="sponsor-item">
      <div class="sponsor-name">${s.legislator_name}
        ${s.legislator_party ? `<span class="leg-party-${s.legislator_party}">(${s.legislator_party})</span>` : ''}
      </div>
      <div class="sponsor-meta">
        ${[s.role, s.district, s.state_code].filter(Boolean).join(' · ')}
        ${s.ballotpedia_url ? ` · <a href="${s.ballotpedia_url}" target="_blank">Ballotpedia</a>` : ''}
      </div>
    </div>`).join('')
  : '<div class="empty" style="padding:20px">No sponsor data available.</div>';

  const hearingHtml = data.hearings.length ? data.hearings.map(h => `
    <div class="hearing-item">
      <strong>${(h.start_dt||'').slice(0,10)||'TBD'}</strong>
      ${h.title ? ` — ${h.title}` : ''}
      ${h.location ? `<br><span style="color:var(--muted);font-size:11px">${h.location}</span>` : ''}
      ${h.event_link ? ` <a href="${h.event_link}" target="_blank" style="font-size:11px">Link ↗</a>` : ''}
    </div>`).join('')
  : '<div style="color:var(--muted);font-size:12px;padding:8px 0">No hearings on record.</div>';

  const summaryHtml = b.summary
    ? `<p class="summary-text">${b.summary.replace(/\n/g,'<br>')}</p>`
    : '<span style="color:var(--muted);font-size:12px">No summary available.</span>';

  document.getElementById('content').innerHTML = `
    <div class="detail-back">
      <button class="btn btn-ghost" onclick="showView('bills',null)">← Back to Bills</button>
    </div>

    <div class="detail-header">
      <div class="detail-main">
        <div class="detail-title">${b.state} ${b.bill_number} — ${b.title}</div>
        <div class="detail-meta">
          ${statusBadge(b.status)}
          ${tags}
        </div>
        ${links ? `<div class="detail-links">${links}</div>` : ''}
      </div>
      <dl class="detail-side">
        <div class="detail-kv"><dt>Introduced</dt><dd>${b.introduced_date||'—'}</dd></div>
        <div class="detail-kv"><dt>Last Action</dt><dd>${(b.last_action_date||'').slice(0,10)||'—'}</dd></div>
        <div class="detail-kv"><dt>Session</dt><dd>${b.session||'—'}</dd></div>
        <div class="detail-kv"><dt>LegiScan ID</dt><dd>${b.legiscanid||'—'}</dd></div>
        <div class="detail-kv"><dt>Full Text</dt><dd>${b.full_text ? '✅ Available' : '⏳ Pending'}</dd></div>
      </dl>
    </div>

    <div class="detail-grid">
      <div class="detail-section">
        <div class="card-header">Summary</div>
        <div class="inner">${summaryHtml}</div>
      </div>
      <div class="detail-section">
        <div class="card-header">Sponsors (${data.sponsors.length})</div>
        <div class="inner" style="max-height:260px;overflow-y:auto">${sponsorHtml}</div>
      </div>
    </div>

    <div class="detail-full">
      <div class="detail-section">
        <div class="card-header">Hearings (${data.hearings.length})</div>
        <div class="inner">${hearingHtml}</div>
      </div>
    </div>

    ${b.full_text ? `
    <div class="detail-full">
      <div class="detail-section">
        <div class="card-header">Full Bill Text</div>
        <div class="inner">
          <pre style="white-space:pre-wrap;font-size:12px;line-height:1.6;max-height:500px;overflow-y:auto;color:var(--text)">${b.full_text.replace(/</g,'&lt;')}</pre>
        </div>
      </div>
    </div>` : ''}
  `;
}

// ─────────────────────────────────────────────────────────────────────────────
// LEGISLATORS VIEW
// ─────────────────────────────────────────────────────────────────────────────
async function renderLegislators() {
  const data = await api('/api/legislators');
  const legs = data.legislators;

  const partyCount = {};
  legs.forEach(l => { const p = l.legislator_party||'?'; partyCount[p] = (partyCount[p]||0)+1; });

  let rows = '';
  for (const l of legs) {
    const partyClass = l.legislator_party ? `leg-party-${l.legislator_party}` : '';
    rows += `
      <tr>
        <td><strong>${l.legislator_name||'—'}</strong></td>
        <td><span class="${partyClass}">${l.legislator_party||'—'}</span></td>
        <td>${l.role||'—'}</td>
        <td>${l.district||'—'}</td>
        <td>${l.state_code||'—'}</td>
        <td style="text-align:center"><strong>${l.bill_count}</strong></td>
        <td>${l.in_office ? '✅' : '❌'}</td>
        <td style="font-size:11px">
          ${l.ballotpedia_url ? `<a href="${l.ballotpedia_url}" target="_blank">Ballotpedia</a>` : ''}
          ${l.follow_the_money_url ? ` <a href="${l.follow_the_money_url}" target="_blank">FTM</a>` : ''}
        </td>
      </tr>`;
  }
  if (!rows) rows = `<tr><td colspan="8" class="empty">No legislator data.</td></tr>`;

  const partyBadges = Object.entries(partyCount).sort((a,b)=>b[1]-a[1]).map(([p,c]) =>
    `<span class="status s-other">${p}: ${c}</span>`
  ).join(' ');

  document.getElementById('content').innerHTML = `
    <div class="filters" style="margin-bottom:16px">
      <input type="text" id="leg-search" placeholder="Search by name…"
             onkeydown="if(event.key==='Enter')filterLegislators()">
      <select id="leg-party" onchange="filterLegislators()">
        <option value="">All Parties</option>
        <option value="D">Democrat</option>
        <option value="R">Republican</option>
        <option value="I">Independent</option>
      </select>
      <button class="btn btn-primary" onclick="filterLegislators()">Filter</button>
      <span style="margin-left:auto;color:var(--muted);font-size:12px">${legs.length} legislators · ${partyBadges}</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Name</th><th>Party</th><th>Role</th><th>District</th><th>State</th><th style="text-align:center">Bills</th><th>In Office</th><th>Links</th></tr>
        </thead>
        <tbody id="leg-body">${rows}</tbody>
      </table>
    </div>
  `;
}

async function filterLegislators() {
  const search = document.getElementById('leg-search')?.value.trim() || '';
  const party  = document.getElementById('leg-party')?.value || '';
  const params = new URLSearchParams();
  if (search) params.set('search', search);
  if (party)  params.set('party',  party);
  const data = await api('/api/legislators?' + params);
  let rows = '';
  for (const l of data.legislators) {
    const partyClass = l.legislator_party ? `leg-party-${l.legislator_party}` : '';
    rows += `
      <tr>
        <td><strong>${l.legislator_name||'—'}</strong></td>
        <td><span class="${partyClass}">${l.legislator_party||'—'}</span></td>
        <td>${l.role||'—'}</td>
        <td>${l.district||'—'}</td>
        <td>${l.state_code||'—'}</td>
        <td style="text-align:center"><strong>${l.bill_count}</strong></td>
        <td>${l.in_office ? '✅' : '❌'}</td>
        <td style="font-size:11px">
          ${l.ballotpedia_url ? `<a href="${l.ballotpedia_url}" target="_blank">Ballotpedia</a>` : ''}
          ${l.follow_the_money_url ? ` <a href="${l.follow_the_money_url}" target="_blank">FTM</a>` : ''}
        </td>
      </tr>`;
  }
  document.getElementById('leg-body').innerHTML = rows || `<tr><td colspan="8" class="empty">No results.</td></tr>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// HEARINGS VIEW
// ─────────────────────────────────────────────────────────────────────────────
async function renderHearings() {
  const data = await api('/api/hearings');
  const hs = data.hearings;

  let rows = '';
  for (const h of hs) {
    rows += `
      <tr ${h.bill_id ? `onclick="showView('detail','${h.bill_id}')" style="cursor:pointer"` : ''}>
        <td>${(h.start_dt||'').slice(0,10)||'TBD'}</td>
        <td>${h.state||'—'} ${h.bill_number||''}</td>
        <td style="max-width:260px">${(h.bill_title||'').slice(0,80)||'—'}</td>
        <td>${h.title||'—'}</td>
        <td>${h.status||'—'}</td>
        <td>${h.location||'—'}</td>
        <td>${h.event_link ? `<a href="${h.event_link}" target="_blank">Link ↗</a>` : '—'}</td>
      </tr>`;
  }
  if (!rows) rows = `<tr><td colspan="7" class="empty">No hearing data available.</td></tr>`;

  document.getElementById('content').innerHTML = `
    <div style="margin-bottom:12px;color:var(--muted);font-size:13px">${hs.length} hearings · Click a row to view the bill detail.</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Date</th><th>Bill</th><th>Bill Title</th><th>Hearing</th><th>Status</th><th>Location</th><th>Link</th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}
